<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | The Luxury Studio Barbershop</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    *, ::before, ::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      line-height: 1.6;
      color: #fff;
      background: #050505;
      overflow-x: hidden;
      padding: 0;
      margin: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
      position: relative;
      z-index: 10;
    }

    .text-center { text-align: center; }
    .d-flex { display: flex; }
    .justify-between { justify-content: space-between; }
    .align-center { align-items: center; }
    .flex-wrap { flex-wrap: wrap; }
    .gap-1 { gap: 1rem; }
    img { max-width: 100%; height: auto; }
    a { text-decoration: none; color: inherit; }

    h1, h2, h3, h4, h5, h6, nav a {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }

    /* Header con logo y menu */
    header {
      padding: 1rem 0;
      background: rgba(0,0,0,0.9);
      position: sticky;
      top: 0;
      z-index: 999;
      border-bottom: 2px solid #d4af37;
    }

    .header-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .header-logo img {
      height: 120px;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(212,175,55,0.5);
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 0.5rem 0;
    }

    nav a {
      font-weight: bold;
      padding: 0.5rem 1rem;
      color: #d4af37;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    nav a:hover, nav a.active {
      color: #fff;
      text-decoration: underline;
    }

    /* Sección Contacto */
    section {
      padding: 100px 12%;
      background: #050505;
      text-align: center;
    }

    h2 {
      color: #d4af37;
      font-size: 2.8rem;
      margin-bottom: 40px;
    }

    .contact-container {
      max-width: 800px;
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .card {
      background: rgba(20,20,20,0.8);
      border: 1px solid #d4af37;
      padding: 30px;
      border-radius: 8px;
      width: 100%;
      text-align: center;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: 0;
      border-radius: 8px;
    }

    .contact-title {
      font-size: 1.5rem;
      color: #d4af37;
      margin-bottom: 15px;
    }

    .contact-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    .contact-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 20px;
      background: rgba(212,175,55,0.1);
      border: 1px solid #d4af37;
      border-radius: 5px;
      color: #d4af37;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .contact-link:hover {
      background: #d4af37;
      color: #000;
      box-shadow: 0 0 10px rgba(212,175,55,0.5);
    }

    /* Footer */
    footer {
      background: #000;
      text-align: center;
      padding: 30px;
      color: #999;
      border-top: 1px solid #333;
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { flex-direction: column; gap: 0.8rem; }
      section { padding: 50px 5%; }
    }
  </style>
</head>
